name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run lint (ruff)
        run: |
          pip install ruff
          ruff check . || true

      - name: Run tests
        run: |
          pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: bedrock
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d bedrock" --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres and run DB init smoke test
        env:
          DATABASE_URL: postgresql://app:pass@localhost:5432/bedrock
        run: |
          python - <<'PY'
import time
import psycopg
from psycopg.rows import dict_row
from app.services.postgres_service import PostgresService
from app.config import load_config
import os

os.environ['DATABASE_URL'] = 'postgresql://app:pass@localhost:5432/bedrock'

for i in range(20):
    try:
        cfg = load_config()
        pg = PostgresService(cfg)
        print('PostgresService initialized and schema verified')
        break
    except Exception as e:
        print('Waiting for Postgres...', e)
        time.sleep(3)
else:
    raise SystemExit('Postgres did not become available')
PY
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run lint
        run: python -m ruff check app tests
      - name: Run tests
        run: python -m pytest tests
